name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Manuel çalıştırma butonu ekler

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          # Android SDK'yı silmiyoruz çünkü Buildozer kendi SDK'sını yönetir

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Build süresini hızlandırmak için SDK ve NDK'yı önbelleğe alıyoruz
      - name: Cache Buildozer Data
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
            autoconf automake libtool pkg-config cmake zip unzip git gettext libltdl-dev \
            libncurses5 libncursesw5-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer python-for-android

      - name: Build with Buildozer
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          export BUILDOZER_ALLOW_ORG_NAME_START_WITH_NUMBER=1
          
          # Buildozer'ı arka planda başlatıp logları bir dosyaya yazıyoruz
          (buildozer android debug > buildozer_output.log 2>&1 &
           PID=$!
           echo "Buildozer başlatıldı (PID: $PID)... APK pişiyor."
           
           # GitHub'ın zaman aşımına uğramaması için her 1 dakikada bir logun sonunu bas
           while kill -0 $PID 2>/dev/null; do
             echo "--- Build devam ediyor... (Son 5 satır) ---"
             tail -n 5 buildozer_output.log
             sleep 60
           done
           wait $PID) || {
            echo "--- !!! HATA OLUŞTU !!! ---"
            tail -n 100 buildozer_output.log
            exit 1
          }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KuryeTakip_V2.2
          path: bin/*.apk
