name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Daha kararlı olan bir önceki sürüme çekiyoruz

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
            libasound2-dev libpulse-dev python3-pip autoconf automake libtool \
            pkg-config libncurses5-dev libncursesw5-dev cmake zip unzip git \
            m4 gettext libltdl-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" "buildozer>=1.5.0" "python-for-android>=2023.9.14"

      - name: Build with Buildozer
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          export BUILDOZER_ALLOW_ORG_NAME_START_WITH_NUMBER=1
          
          # Buildozer'ın eski kalıntılarını temizle ve taze başla
          buildozer android clean
          
          # Hata analizi için log tut, ama süreci durdurma
          yes | buildozer -v android debug > build.log 2>&1 || {
            echo "--- HATA ANALİZİ ---"
            # Makro hatası devam ediyorsa logun tamamını değil, can alıcı yerini bas
            tail -n 100 build.log
            exit 1
          }
        env:
          TERM: xterm

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KuryeTakip_Final_APK
          path: bin/*.apk
