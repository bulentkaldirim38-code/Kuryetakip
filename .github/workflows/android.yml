name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
            autoconf automake libtool pkg-config cmake zip unzip git gettext libltdl-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer python-for-android

      - name: Optimize buildozer.spec
        run: |
          # buildozer.spec içindeki gereksiz dosyaları dışlama ayarını güncelle
          # Bu komut, test klasörlerini derleme dışı bırakır
          sed -i 's/python3/python3,sqlite3/g' buildozer.spec || true
          sed -i '/android.api =/c\android.api = 31' buildozer.spec || true

      - name: Build with Buildozer
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          export BUILDOZER_ALLOW_ORG_NAME_START_WITH_NUMBER=1
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g"
          
          # En önemli kısım: Logları tamamen kapatıyoruz (-q: quiet mode)
          # Sadece derleme bittiğinde veya hata verdiğinde konuşacak
          buildozer -q android debug || {
            echo "--- SADECE GERÇEK HATA SATIRLARI ---"
            grep -iE "error|fail" buildozer.log | tail -n 50
            exit 1
          }
        env:
          TERM: xterm

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KuryeTakip_Final_APK
          path: bin/*.apk
