Name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libasound2-dev \
            libpulse-dev \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            libncurses5 \
            libncursesw5 \
            cmake \
            zip \
            unzip \
            git
          pip install --upgrade pip
          # Kivy 2.2.1 ve üzeri için Cython 0.29.33 en güvenli sürümdür
          pip install "cython<3.0.0" buildozer

      - name: Build with Buildozer
        run: |
          # Buildozer'ın etkileşimli soruları atlaması için kritik ayarlar
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          export BUILDOZER_ALLOW_ORG_NAME_START_WITH_NUMBER=1
          
          # 'yes' komutu tüm lisans ve onay sorularına otomatik 'y' der
          # '--verbose' yerine doğrudan buildozer.spec içindeki log_level kullanılır
          yes | buildozer -v android debug
        env:
          TERM: xterm

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KuryeTakip-Uygulamasi
          path: bin/*.apk
          if-no-files-found: error
