name: Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space & Clean Python Tests
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          # Python'un logları şişiren test dosyalarını henüz indirilmeden engelleyemeyiz 
          # ama Buildozer klasörünü önceden hazırlayabiliriz.
          mkdir -p .buildozer

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
            autoconf automake libtool pkg-config cmake zip unzip git gettext libltdl-dev
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer python-for-android

      - name: Build with Buildozer
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          export BUILDOZER_ALLOW_ORG_NAME_START_WITH_NUMBER=1
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g"
          
          # SADECE HATALARI GÖRMEK İÇİN --log_level=1
          # Ve derleme sırasında test dosyalarını atlaması için talimat
          buildozer -v android debug --log_level=1 || {
            echo "--- HATA ANALİZİ ---"
            tail -n 100 buildozer.log
            exit 1
          }
        env:
          TERM: xterm

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KuryeTakip_Final_APK
          path: bin/*.apk
