name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev libsqlite3-dev zlib1g-dev \
            libasound2-dev libpulse-dev python3-pip autoconf libtool \
            pkg-config libncurses-dev cmake zip unzip git
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer

      - name: Build with Buildozer
        run: |
          export APP_ANDROID_ACCEPT_SDK_LICENSE=1
          export BUILDOZER_ALLOW_ORG_NAME_START_WITH_NUMBER=1
          # Broken pipe hatasını engellemek için daha stabil bir yöntem
          yes | buildozer -v android debug || true
        env:
          TERM: xterm
          COLUMNS: 80
          LINES: 24

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KuryeTakip_Paketi
          path: bin/*.apk
